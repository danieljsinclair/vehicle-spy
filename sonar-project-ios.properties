# SonarCloud static analysis — vehicle-spy-ios (iOS app only).
#
# THREE projects now cover the codebase (split from the original single
# danieljsinclair_vehicle-spy that held all three):
#
#   * THIS FILE  -- danieljsinclair_vehicle-spy-ios
#       iOS app (vehicle-sim-ios/VehicleSim/) ONLY. Swift + Obj-C++ (the
#       VehicleSimWrapper.mm bridging layer). Quality (SonarCloud's native
#       Swift/Obj-C plugin reads from the Xcode build log) + coverage (iOS
#       xccov from xcodebuild test -enableCodeCoverage). No C++ core sources
#       (those live in the vehicle-spy project).
#
#   * sonar-project.properties -- danieljsinclair_vehicle-spy
#       C++ core (src/, include/) + unit tests (test/). Quality (cfamily reads
#       build-cov/compile_commands.json) + coverage (C++ lcov from CMake tests).
#
#   * sonar-project-esp32.properties -- danieljsinclair_vehicle-spy-firmware
#       ESP32 firmware (firmware/can-bridge/) only. Quality only (no coverage:
#       no firmware unit tests). Arduino-specific .ino handling lives there.
#
# The Makefile's `sonar-scan-ios` target points at THIS file; `sonar-scan`
# points at the main properties; `sonar-scan-esp32` points at -esp32.
sonar.projectKey=danieljsinclair_vehicle-spy-ios
sonar.projectName=vehicle-spy-ios
sonar.organization=danieljsinclair
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8
sonar.working.directory=build-sonar/.sonar

# iOS app sources only. No C++ core, no firmware.
sonar.sources=vehicle-sim-ios/VehicleSim

# iOS unit-test sources (VehicleSimTests/) are analysed for quality but
# excluded from coverage (test code is not counted towards the coverage %).
sonar.tests=vehicle-sim-ios/VehicleSimTests

# Exclude build artefacts, generated bridging headers, and Python bytecode.
sonar.exclusions=build*/**,VehicleSim/build/**,**/VehicleSim-Swift.h,**/__pycache__/**
sonar.coverage.exclusions=**/*Tests*.*,**/*Test*.*

# No cfamily / compile_commands.json: SonarCloud's native Swift/Obj-C plugin
# parses .swift and .mm sources directly from the Xcode build log. (The C++
# core is analysed separately by the vehicle-spy project.)

# Coverage: iOS xccov -> SonarCloud generic XML (written by xccov_to_sonar.py
# from the xcresult bundle produced by coverage-ios).
sonar.coverageReportPaths=build-ios/coverage-ios.xml
