# SonarCloud static analysis — vehicle-spy (C++ core + iOS app + ESP32 firmware).
#
# ONE project (danieljsinclair_vehicle-spy) covering all three codebases:
#   * C++ core (src/, include/)  -- quality (cfamily) + coverage (lcov from CMake tests)
#   * iOS app (vehicle-sim-ios/VehicleSim/) -- quality (Swift + cfamily) + coverage (xccov)
#   * ESP32 firmware (firmware/can-bridge/) -- quality only (no coverage: no firmware tests)
#
# cfamily reads ONE merged compile_commands.json (build-sonar/) that combines the
# C++ CMake database (build-cov, host clang) and the Arduino xtensa database
# (build-firmware, filtered to per-.ino CUs by sonar_filter_compdb.py). cfamily
# runs its own front end against the captured flags, so the xtensa/clang toolchains
# need not be on the scanner host's PATH. See scripts/merge_compile_commands.py.
sonar.projectKey=danieljsinclair_vehicle-spy
sonar.projectName=vehicle-spy
sonar.organization=danieljsinclair
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# All source dirs (C++ core + iOS app + firmware). Build artefacts, deps, and
# the per-user OTA public key header are excluded below.
sonar.sources=src,include,firmware/can-bridge,vehicle-sim-ios/VehicleSim

# Exclude build artefacts, fetched deps, Python bytecode, and the auto-generated
# OTA public key header (regenerated per-user from a private key; analysing the
# baked-in key bytes would flag a "hardcoded secret" false positive).
sonar.exclusions=build*/**,external/**,build-firmware/**,build-native/**,**/OtaPublicKey.h,*.pyc,__pycache__/**

# C/C++ analyzer config.
#
# Arduino .ino is NOT a C/C++ extension cfamily recognises (it flags the TU
# "unsupported" and skips it). The firmware compile_commands.json emits one CU
# per .ino source with `-x c++` to force C++ parsing; sonar.cpp.file.suffixes
# is extended with .ino so the raw sketch files are indexed as C++ for language
# attribution.
sonar.cpp.file.suffixes=.ino,.cpp,.cc,.cxx,.hpp,.hh,.hxx,.h
sonar.cfamily.threads=4
sonar.cfamily.compile-commands=build-sonar/compile_commands.json

# Coverage: C++ core (lcov -> generic XML) + iOS app (xccov -> generic XML).
# ESP32 firmware has no coverage (no unit tests). Comma-separated: the scanner
# merges all listed reports.
sonar.coverageReportPaths=build-cov/coverage-sonar.xml,build-ios/coverage-ios.xml
