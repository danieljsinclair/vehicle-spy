# SonarCloud static analysis — ESP32 CAN-bridge firmware (CODE QUALITY ONLY).
#
# Scope: firmware/can-bridge/ (Arduino sketches). No coverage — there are no
# firmware unit tests yet (coverage needs a testable-lib breakout first).
# compile_commands.json is generated by `make sonar-compiledb` via arduino-cli's
# --only-compilation-database, then filtered to per-.ino CUs for cfamily
# (see scripts/sonar_filter_compdb.py for why this transform is required).
sonar.projectKey=danieljsinclair_vehicle-spy
sonar.projectName=vehicle-spy
sonar.organization=danieljsinclair
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# Firmware sketches only — the rest of vehicle-sim (native C++, iOS, scripts)
# is owned by other projects / out of scope for this quality gate.
sonar.sources=firmware/can-bridge

# Exclude build artefacts, deps, and the auto-generated OTA public key header
# (regenerated per-user from a private key; analysing the baked-in key bytes
# would just flag the "hardcoded secret" false positive).
sonar.exclusions=build-firmware/**,build/**,build-native/**,external/**,**/OtaPublicKey.h

# C/C++ analyzer config. cfamily is cross-compile-aware: it reads the xtensa
# compile flags from compile_commands.json but runs its own front end, so the
# ESP32 toolchain does not need to be on the scanner host's PATH.
#
# Arduino .ino is NOT a C/C++ extension cfamily recognises (it flags the TU
# "unsupported" and skips it). The Makefile's compile_commands.json therefore
# emits one CU per .ino source with `-x c++` to force C++ parsing. We also
# extend sonar.cpp.file.suffixes with .ino so the raw sketch files are indexed
# as C++ for language attribution.
sonar.cpp.file.suffixes=.ino,.cpp,.cc,.cxx,.hpp,.hh,.hxx,.h
sonar.cfamily.threads=4
sonar.cfamily.compile-commands=build-firmware/compile_commands.json
