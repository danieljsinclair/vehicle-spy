# SonarCloud static analysis — vehicle-spy (C++ core only).
#
# THREE projects now cover the codebase (split from the original single
# danieljsinclair_vehicle-spy that held all three):
#
#   * THIS FILE  -- danieljsinclair_vehicle-spy
#       C++ core (src/, include/) + unit tests (test/). Quality (cfamily reads
#       build-cov/compile_commands.json) + coverage (C++ lcov from CMake tests).
#       No iOS sources (those live in vehicle-spy-ios).
#
#   * sonar-project-ios.properties -- danieljsinclair_vehicle-spy-ios
#       iOS app (vehicle-sim-ios/VehicleSim/) only. Swift + Obj-C++ bridging
#       layer. Quality (SonarCloud's native Swift/Obj-C plugin) + coverage
#       (iOS xccov from xcodebuild test -enableCodeCoverage).
#
#   * sonar-project-esp32.properties -- danieljsinclair_vehicle-spy-esp32
#       ESP32 firmware (firmware/can-bridge/) only. Quality only (no coverage:
#       no firmware unit tests). Arduino-specific .ino handling lives there.
#
# The Makefile's `sonar-scan` target points at THIS file; `sonar-scan-ios`
# points at -ios; `sonar-scan-esp32` points at -esp32.
sonar.projectKey=danieljsinclair_vehicle-spy
sonar.projectName=vehicle-spy
sonar.organization=danieljsinclair
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8
sonar.working.directory=build-sonar/.sonar

# C++ core sources. iOS lives in vehicle-spy-ios; the ESP32 firmware (.ino
# veneer + extracted vanilla cpp + ESP32-specific hardware) lives in
# vehicle-spy-esp32. This project owns src/ + include/ only.
#
# INVERSION DEFERRED (2026-07-12, user decision (c) — honor Sonar-zero gate).
# The inversion would ADD `firmware/vanilla` here (testable extracted cpp,
# compiled into this project's host tests, covered at ~64% — honest attribution
# is vehicle-spy, not esp32). It was reverted because it inherits ~93 pre-
# existing vanilla Sonar issues into vehicle-spy (100 OPEN vs 7), breaking the
# Sonar-zero gate. Re-apply when the user picks (a) fix-93-first or (b)
# accept-red-then-drive-to-zero. Re-apply = sonar.sources=src,include,firmware/vanilla
# AND narrow sonar.exclusions from firmware/** to firmware/can-bridge/**.
# @GENERATED@ do not edit below — derived from coverage-manifest.toml
sonar.sources=src,include
# @END@

# C++ unit-test sources.
sonar.tests=test

# Exclude build artefacts, fetched deps, Python bytecode, the ESP32-only
# firmware (the .ino sketch veneer + ESP32-specific hardware files + the
# can-bridge/ symlinks that duplicate vanilla — vanilla is the canonical source
# we analyse, not the symlink facade), and the auto-generated OTA public key
# header (regenerated per-user from a private key; analysing the baked-in key
# bytes would flag a "hardcoded secret" false positive).
#
# NOTE: firmware/vanilla/ is IN sonar.sources (the testable extracted cpp,
# compiled into this project's host tests). firmware/can-bridge/** is excluded
# because (a) the .ino + ESP32 hardware files belong to vehicle-spy-esp32, and
# (b) most can-bridge files are symlinks to ../vanilla/ — analysing both paths
# would double-count the same file. vanilla is the single canonical path.
#
# Also exclude the two iOS-only Objective-C++ sources under src/ (the iOS
# CoreBluetooth backend and the iOS DBC content provider). sonar.sources=src
# sweeps them in, but they are never compiled into the host cfamily target
# (compile_commands.json) — they belong to the vehicle-spy-ios project, which
# parses them natively from the Xcode build log. Keeping them out of this
# project is the single-source-of-truth fix: vehicle-spy analyses only what it
# compiles + tests, vehicle-spy-ios owns the iOS sources.
#
# Also exclude the 3 app/composition-entry sources (Path A, Phase 2): main.cpp
# (argv dispatch + BLE hardware entry — int main() + anon-namespace helpers) and
# the cli/*RunContext.cpp composition roots (wire the live/replay pipeline via
# heavy DI allocation; integration-test territory, not unit). These are not
# unit-testable; excluding them drops untestable code from the coverage
# denominator honestly. The remaining 7 testable-but-untested files stay IN
# scope and surface as 0% (via lcov_add_uninstrumented) until tests land.
# @GENERATED@ do not edit below — derived from coverage-manifest.toml
sonar.exclusions=build*/**,external/**,firmware/**,**/OtaPublicKey.h,**/*.mm,*.pyc,__pycache__/**
# @END@

# C/C++ analyzer config.
#
# cfamily reads the C++ CMake compile_commands.json (build-cov/). No Arduino/
# iOS sources in this project.
sonar.cfamily.threads=4
sonar.cfamily.compile-commands=build-cov/compile_commands.json

# Coverage: C++ core only (lcov -> generic XML). iOS coverage lives in the
# vehicle-spy-ios project.
sonar.coverageReportPaths=build-cov/coverage-sonar.xml


# @GENERATED@ do not edit below — derived from coverage-manifest.toml
sonar.coverage.exclusions=**/*.mm
# @END@
