# SonarCloud static analysis — vehicle-spy-esp32 (ESP32 firmware only).
#
# Quality + coverage project for the ESP32 CAN-bridge firmware. The extracted
# vanilla C++ classes (firmware/vanilla/*.cpp) are host-tested via GoogleTest
# and have coverage instrumentation. The .ino sketch itself remains quality-only.
# Standalone: reads its own Arduino/xtensa compile_commands.json (build-firmware/)
# and caches its own reports there.
#
# See sonar-project.properties (vehicle-spy, C++ core) and
# sonar-project-ios.properties (vehicle-spy-ios, iOS app) for the other two
# projects and the full split rationale.
sonar.projectKey=danieljsinclair_vehicle-spy-esp32
sonar.projectName=vehicle-spy-esp32
sonar.organization=danieljsinclair
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8
sonar.working.directory=build-sonar/.sonar

# ESP32 firmware sources: .ino sketch + extracted vanilla C++ classes.
# @GENERATED@ do not edit below — derived from coverage-manifest.toml
sonar.sources=firmware/can-bridge,firmware/vanilla
# @END@

# Exclude build artefacts, test code, mocks, and the auto-generated OTA public
# key header.
#
# DEMARCATION (3-way split, no double-count): firmware/vanilla/*.cpp is the
# TESTABLE extracted C++ — it is compiled into vehicle-spy's host tests and
# covered THERE (vehicle-spy owns it, where it is tested). Excluding it here
# keeps each production line in exactly ONE project. vehicle-spy-esp32 owns the
# .ino veneer + the ESP32-specific hardware files (GPIO, the .ino sketches) that
# are not host-testable. As extraction proceeds (code moves out of the .ino into
# vanilla cpp), the vehicle-spy line count RISES and the esp32 .ino SHRINKS — the
# intended scorecard signal. See three-project-demarcation-audit memory.
#
# INVERSION DEFERRED (2026-07-12, user decision (c)). The inversion would ADD
# `firmware/vanilla/**` here (so vanilla cpp is owned by vehicle-spy, not esp32).
# Reverted because the inversion inherits ~93 vanilla Sonar issues into
# vehicle-spy, breaking its Sonar-zero gate. Re-apply `firmware/vanilla/**` here
# AND add `firmware/vanilla` to vehicle-spy sonar.sources when the user picks
# (a) fix-93-first or (b) accept-red.
# @GENERATED@ do not edit below — derived from coverage-manifest.toml
sonar.exclusions=build-firmware/**,build-verify/**,firmware/tests/**,firmware/mocks/**,**/OtaPublicKey.h,firmware/**/Arduino*.h
# @END@

# Coverage: host-test vanilla C++ coverage (lcov -> generic XML).
sonar.coverageReportPaths=firmware/build-verify/coverage-sonar.xml

# C/C++ analyzer config.
#
# cfamily reads the Arduino/xtensa compile_commands.json (build-firmware/),
# filtered to per-.ino CUs by sonar_filter_compdb.py. No merged database.
sonar.cfamily.threads=4
sonar.cfamily.compile-commands=build-firmware/compile_commands.json

# Arduino .ino is NOT a C/C++ extension cfamily recognises (it flags the TU
# "unsupported" and skips it). The firmware compile_commands.json emits one CU
# per .ino source with `-x c++` to force C++ parsing; sonar.cpp.file.suffixes
# is extended with .ino so the raw sketch files are indexed as C++ for
# language attribution.
#
# sonar.c.file.suffixes=- DISABLES the C language entirely: there are no .c
# sources, and leaving it enabled makes .h ambiguous (default C pattern claims
# **/*.h too), which aborts the scan with "Language of file ... can not be
# decided". Disabling C hands all .h files unambiguously to C++.
sonar.c.file.suffixes=-

# @GENERATED@ do not edit below — derived from coverage-manifest.toml
sonar.cpp.file.suffixes=.ino,.cpp,.cc,.cxx,.hpp,.hh,.hxx,.h
# @END@
