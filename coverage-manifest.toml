# Coverage manifest — the SINGLE SOURCE OF TRUTH for the 3 SonarCloud projects'
# source/exclusion sets. Everything else DERIVES from this file:
#
#   * the 3 sonar-project*.properties files' `sonar.sources` /
#     `sonar.exclusions` / `sonar.coverage.exclusions` lines are REGENERATED
#     by scripts/gen_coverage_config.py (run at scan time); the static lines
#     (projectKey, org, compile-commands, coverageReportPaths) stay hand-written.
#   * the Makefile's COVERAGE_SRC_DIRS / COVERAGE_EXCLUDES are queried by
#     scripts/manifest_query.py (shell-out from the coverage recipes).
#   * `make manifest-check` guards that the properties files are in sync with
#     this manifest (fails if someone hand-edits a derived line).
#
# DESIGN RULES (the user's non-negotiable acceptance criteria):
#   1. Every production line counted EXACTLY ONCE — in exactly ONE project's
#      denominator. The 3 projects' source sets are DISJOINT (no overlap).
#   2. PATH/WILDCARD grouping by directory — NOT leaf-file enumeration. The ONE
#      exception is the esp32 symlink set (machine-derived via
#      `find firmware/can-bridge -type l`, handled in code, not listed here).
#   3. No count-zero: exclusion-to-hide is forbidden. Files either land in a
#      project's denominator (counted, covered or honest-uncovered) or are a
#      real config/build artifact (excluded everywhere for a documented reason).
#   4. No Sonar suppression / NOSONAR ever.
#
# Format: TOML (stdlib tomllib, read-only). One [[project]] table per SonarCloud
# project. `sources` = sonar.sources dir list. `exclusions` = sonar.exclusions
# patterns. `coverage_exclusions` (optional) = sonar.coverage.exclusions.
# `deferred` (optional) = the pluggable .mm gap (see notes below).

# =============================================================================
# vehicle-spy — C++ core (src/, include/) + unit tests (test/).
# cfamily (build-cov/compile_commands.json) + lcov coverage.
# =============================================================================
[[project]]
key = "vehicle-spy"
properties = "sonar-project.properties"
sources = ["src", "include"]
# SUFFIX MODEL (option C) — REVERTED 2026-07-13 per pure-fallback decision.
# Adding ".mm" to sonar.cpp.file.suffixes makes cfamily claim .mm AS C++ and
# analyse it (cfamily has no native Obj-C++ mode). It DID create a component +
# coverage for BLEManagerMacOS.mm (the ONLY mechanism that counts a .mm) BUT at
# the cost of +8 OPEN (5 PERMANENT false positives incl. #import->#include
# S3805) + a shared-header S1117 side-effect (ConnectionState.h `id` shadow).
# It also solved only 1-of-4 .mm (the 3 iOS .mm stay uncountable — see the
# suffix-full ruled-out record on the vehicle-spy-ios project below). The user
# chose the PURE FALLBACK instead: drop option-C, two-sided **/*.mm exclusion
# (sonar==lcov matches for all 3), xcodebuild analyze + -Werror as the Obj-C++
# QUALITY channel (zero cfamily FPs), and the .mm tracked as yellow deferred
# warnings with migrate-to-.cpp as the durable resolution. NO cfamily_cpp_suffixes
# field here -> the generator emits NO sonar.cpp.file.suffixes line -> cfamily
# uses its built-in default (.cpp,.cc,.cxx,.c++,.cppm) -> no .mm analysis.
exclusions = [
    "build*/**",
    "external/**",
    "firmware/**",                       # esp32 owns firmware; no C++ core overlap
    "**/OtaPublicKey.h",                 # generated per-user Ed25519 key (config artifact)
    "**/*.mm",                           # Obj-C++ .mm — cfamily cannot index; see [deferred.mm]
    "*.pyc",
    "__pycache__/**",
]
# Two-sided .mm headline exclusion (pure-fallback policy 2026-07-13): .mm is
# excluded from COVERAGE here AND filtered from the sonar-bound XML
# (lcov_to_xml.py --exclude-glob '**/*.mm', wired in the Makefile). Both sides
# must drop .mm for sonar==lcov to match. The raw lcov.info still carries .mm
# per-file for inspection (scoped out of the HEADLINE only, not lost). The glob
# `**/*.mm` auto-catches past/present/future .mm with zero file-name edits.
coverage_exclusions = [
    "**/*.mm",          # Obj-C++ .mm uncountable by cfamily — two-sided headline exclusion
]
# NOTE: main.cpp + cli/LiveRunContext.cpp + cli/ReplayRunContext.cpp are
# intentionally NOT excluded — they surface as honest-uncovered (counted once
# via lcov_add_uninstrumented synthetic 0% entries) per the exactly-once rule.

# =============================================================================
# vehicle-spy-ios — iOS app (vehicle-sim-ios/VehicleSim/) + tests.
# SonarCloud Swift/Obj-C plugin + xccov coverage.
# =============================================================================
[[project]]
key = "vehicle-spy-ios"
properties = "sonar-project-ios.properties"
sources = ["vehicle-sim-ios/VehicleSim"]
# NO cfamily on this project. The SUFFIX-FULL probe (2026-07-13) RULED OUT
# cfamily for .mm with hard evidence — documented here so the dead-end is not
# retried:
#   * scripts/xcodebuild_to_compile_commands.py (copied from the app's proven
#     scraper) WAS wired: it synthesized build-ios/compile_commands.json with
#     49 real CUs (3 .mm + 46 .cpp), each .mm carrying -x objective-c++ + std +
#     -I roots — structurally IDENTICAL to the app's working EngineSimWrapper.mm
#     entry (same clang, same arg count, same -x kind).
#   * cfamily STILL logged "Number of skipped unsupported compilation units: 3"
#     (the 3 .mm) with or without sonar.cpp.file.suffixes=.mm. The .mm CU is
#     rejected by cfamily's internal classifier BEFORE parsing — it is a hard
#     "unsupported", not a parse failure, and no suffix/config combination
#     changes it.
#   * THE APP ITSELF HAS THE SAME GAP: its own scanner log (build-coverage/
#     sonar-scanner.log) shows "skipped unsupported compilation units: 1" for
#     its EngineSimWrapper.mm, and the app's SonarCloud component_tree returns
#     ZERO .mm components. The app's comment block (sonar-project.properties
#     L17-28) states cfamily "cannot index Objective-C++ (.mm) on any tier".
#   * Conclusion: cfamily indexes .cpp CUs (the app's 4 .cpp analyze fine) but
#     NEVER .mm. Wiring cfamily on iOS would only offer the 46 .cpp core CUs,
#     which are OWNED by vehicle-spy (double-count) — so there is no value in
#     iOS cfamily at all. The scraper + Makefile `compile-ios` target are kept
#     as proven infrastructure; the manifest simply does not point cfamily at
#     the result.
# The 3 iOS .mm stay a DECLARED gap (decision B). See [deferred.mm] below.
exclusions = [
    "build*/**",
    "VehicleSim/build/**",
    "**/VehicleSim-Swift.h",             # generated bridging header (build artifact)
    "**/*.mm",                           # Obj-C++ .mm — cfamily cannot index; see [deferred.mm]
    "**/__pycache__/**",
]
coverage_exclusions = [
    "src/**",            # C++ core owned by vehicle-spy (xcodebuild compiles it in; drop from iOS coverage)
    "include/**",        #   "    "
    "**/*.mm",           # Obj-C++ .mm uncountable by cfamily — two-sided headline exclusion
    "**/*Tests*.*",      # test code is not coverage
    "**/*Test*.*",       #   "    "
]

# =============================================================================
# vehicle-spy-esp32 — ESP32 firmware: real can-bridge files + vanilla C++.
# cfamily (build-firmware/compile_commands.json) + host-test lcov coverage.
# =============================================================================
[[project]]
key = "vehicle-spy-esp32"
properties = "sonar-project-esp32.properties"
sources = ["firmware/can-bridge", "firmware/vanilla"]
# cfamily file suffixes for the ESP32 firmware. Arduino `.ino` is NOT a C/C++
# extension cfamily recognises by default; the firmware compile_commands.json
# emits one CU per .ino with `-x c++` to force C++ parsing, and this suffix
# list (which REPLACES cfamily's default, so the standard C/C++ suffixes must
# be listed alongside .ino) makes the raw sketch files indexable as C++ for
# language attribution. `sonar.c.file.suffixes=-` (a hand-written static line
# in the properties) disables C entirely so .h is unambiguous C++. See the
# comment block in sonar-project-esp32.properties for the full rationale.
cfamily_cpp_suffixes = [".ino", ".cpp", ".cc", ".cxx", ".hpp", ".hh", ".hxx", ".h"]
exclusions = [
    "build-firmware/**",
    "build-verify/**",
    "firmware/tests/**",                 # test code
    "firmware/mocks/**",                 # test doubles
    "**/OtaPublicKey.h",                 # generated per-user Ed25519 key (config artifact)
    "firmware/**/Arduino*.h",            # ESP32 Arduino platform veneers (platform-specific adapters, #ifdef ARDUINO gated, untestable on host; declared gap like .mm, two-sided exclusion)
]

# =============================================================================
# DEFERRED — the .mm declared gap (PURE FALLBACK adopted 2026-07-13).
# =============================================================================
# SonarCloud has NO clean Obj-C++ analyzer on any tier (4 independent proofs;
# see scripts/COVERAGE_MM_POLICY.md for the full recipe + ruled-out options).
# cfamily rejects every .mm CU as "unsupported" in Compilation-Database mode
# (proven by a 49-CU probe + the sibling app's own scanner log); the Swift
# plugin parses .swift ONLY; a coverage-XML entry alone does NOT create a
# component. So these .mm are count-ZERO everywhere.
#
# DECISION (PURE FALLBACK, landed): keep the headline honest (two-sided
# **/*.mm exclusion -> sonar==lcov for ALL 3 projects), track .mm as a visible
# YELLOW migration roadmap in the coverage scorecard (glob-derived, every
# build), and use `make ios-analyze` (Apple's native Obj-C++ static analyzer)
# as the .mm QUALITY channel (zero cfamily FPs; catches real leaks/dead-stores).
# The durable fix is migrate-to-cpp (thin Obj-C shell + .cpp core, PIMPL) —
# the yellow warnings close one-by-one as each migration lands.
#
# This [deferred.mm] block is now LEGACY FALLBACK CONTEXT — the scorecard's
# warning list is GLOB-DERIVED from the filesystem (scripts/coverage_scorecard.py
# _glob_mm_files), so a new .mm auto-appears in the warnings with no manifest
# edit. The entries below are kept for historical line-count reference + as a
# fallback if the glob ever yields nothing; `lines_measure` documents how each
# count was derived pre-exclusion ("coverable" from a coverage XML; "physical"
# = wc -l upper bound, file never indexed).
[deferred.mm]
status = "deferred"                      # PURE FALLBACK; swap to "counted" only if migrate-to-cpp lands
resolution = "migrate-to-cpp"            # the durable fix (PIMPL; thin Obj-C shell + .cpp core)
note = "count-zero everywhere; declared gap (PURE FALLBACK), NOT hidden. Surfaced as YELLOW warnings in the coverage scorecard (glob-derived). Recipe + ruled-out options: scripts/COVERAGE_MM_POLICY.md. Memory: mm-coverage-impasse-2026-07-13."
[[deferred.mm.files]]
path = "src/ble/platform/BLEManagerMacOS.mm"
owner = "vehicle-spy"
lines = 361
lines_measure = "coverable"              # from pre-exclusion vehicle-spy coverage XML
[[deferred.mm.files]]
path = "src/ble/platform/BLEManageriOS.mm"
owner = "vehicle-spy-ios"
lines = 514
lines_measure = "physical"               # never indexed; coverable unmeasured
[[deferred.mm.files]]
path = "src/domain/IOSDBCContentProvider.mm"
owner = "vehicle-spy-ios"
lines = 23
lines_measure = "physical"               # never indexed; coverable unmeasured
[[deferred.mm.files]]
path = "vehicle-sim-ios/VehicleSim/VehicleSimWrapper.mm"
owner = "vehicle-spy-ios"
lines = 390
lines_measure = "coverable"              # from pre-exclusion iOS coverage XML
